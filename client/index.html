/* ================= BLACKJACK ================= */

function drawCard() {
  const cards = [2,3,4,5,6,7,8,9,10,10,10,10,11];
  return cards[Math.floor(Math.random() * cards.length)];
}

function calculateTotal(cards) {
  let total = cards.reduce((a, b) => a + b, 0);
  let aces = cards.filter(card => card === 11).length;

  while (total > 21 && aces > 0) {
    total -= 10;
    aces--;
  }

  return total;
}

function startBlackjack() {
  const bet = Number(
    document.getElementById("customBet")?.value
  );

  if (!bet || bet <= 0) {
    document.getElementById("gameMsg").innerText =
      "Enter a valid bet";
    return;
  }

  if (bet > balance) {
    document.getElementById("gameMsg").innerText =
      "Not enough balance";
    return;
  }

  blackjackBet = bet;
  blackjackStarted = true;
  doubled = false;

  balance -= bet;
  totalWagered += bet;

  playerCards = [drawCard(), drawCard()];
  dealerCards = [drawCard(), drawCard()];

  playerTotal = calculateTotal(playerCards);
  dealerTotal = calculateTotal(dealerCards);

  updateProfile();
  saveUser();
  renderBlackjack();
}

function renderBlackjack(showDealer = false) {
  const visibleDealer = showDealer
    ? dealerCards.join(" , ")
    : `${dealerCards[0]} , ?`;

  const visibleDealerTotal = showDealer
    ? dealerTotal
    : dealerCards[0];

  document.getElementById("gameDisplay").innerHTML = `
    <h2>Blackjack</h2>

    <p><strong>Bet:</strong> ${blackjackBet}</p>

    <p>
      <strong>Dealer:</strong>
      [ ${visibleDealer} ]
      (${visibleDealerTotal})
    </p>

    <p>
      <strong>You:</strong>
      [ ${playerCards.join(" , ")} ]
      (${playerTotal})
    </p>

    <button onclick="hitBlackjack()">Hit</button>
    <button onclick="standBlackjack()">Stand</button>
    <button onclick="doubleBlackjack()">Double</button>
    <button onclick="splitBlackjack()">Split</button>
  `;
}

function hitBlackjack() {
  if (!blackjackStarted) return;

  playerCards.push(drawCard());
  playerTotal = calculateTotal(playerCards);

  if (playerTotal > 21) {
    blackjackStarted = false;

    document.getElementById("gameMsg").innerText =
      "Bust! You lose.";

    updateProfile();
    saveUser();

    setTimeout(() => {
      showGame("blackjack");
    }, 1500);

    return;
  }

  renderBlackjack();
}

function standBlackjack() {
  if (!blackjackStarted) return;

  while (dealerTotal < 17) {
    dealerCards.push(drawCard());
    dealerTotal = calculateTotal(dealerCards);
  }

  finishBlackjack();
}

function doubleBlackjack() {
  if (!blackjackStarted) return;

  if (balance < blackjackBet) {
    document.getElementById("gameMsg").innerText =
      "Not enough balance to double";
    return;
  }

  balance -= blackjackBet;
  blackjackBet *= 2;
  doubled = true;

  updateProfile();
  saveUser();

  hitBlackjack();

  if (playerTotal <= 21) {
    standBlackjack();
  }
}

function splitBlackjack() {
  document.getElementById("gameMsg").innerText =
    "Split feature placeholder (can upgrade later)";
}

function finishBlackjack() {
  blackjackStarted = false;

  let result = "";

  if (dealerTotal > 21 || playerTotal > dealerTotal) {
    balance += blackjackBet * 2;
    result = "You win!";
  }
  else if (playerTotal === dealerTotal) {
    balance += blackjackBet;
    result = "Push! Bet returned.";
  }
  else {
    result = "Dealer wins.";
  }

  updateProfile();
  saveUser();

  document.getElementById("gameMsg").innerText = result;

  setTimeout(() => {
    showGame("blackjack");
  }, 1500);
}

/* ================= MINES ================= */

let minesBet = 0;
let minesMultiplier = 1;
let minePosition = 0;
let openedMines = [];
let minesStarted = false;

function startMines() {
  const bet = Number(
    document.getElementById("customBet")?.value
  );

  if (!bet || bet <= 0) {
    document.getElementById("gameMsg").innerText =
      "Enter a valid bet";
    return;
  }

  if (bet > balance) {
    document.getElementById("gameMsg").innerText =
      "Not enough balance";
    return;
  }

  minesBet = bet;
  minesMultiplier = 1;
  openedMines = [];
  minesStarted = true;

  // choose 1 bomb from 9 boxes
  minePosition = Math.floor(Math.random() * 9) + 1;

  // remove bet instantly
  balance -= bet;
  totalWagered += bet;

  updateProfile();
  saveUser();

  renderMines();

  document.getElementById("gameMsg").innerText =
    "Game started!";
}

function renderMines() {
  let html = `
    <h2>Mines</h2>
    <p><strong>Bet:</strong> ${minesBet}</p>
    <p><strong>Multiplier:</strong> x${minesMultiplier.toFixed(2)}</p>
    <p>1 Bomb • 8 Diamonds</p>
  `;

  for (let i = 1; i <= 9; i++) {
    if (openedMines.includes(i)) {
      html += `
        <button disabled>💎</button>
      `;
    } else {
      html += `
        <button onclick="playMines(${i})">
          Box ${i}
        </button>
      `;
    }

    if (i % 3 === 0) {
      html += "<br><br>";
    }
  }

  html += `
    <br>
    <button onclick="cashoutMines()">
      Cash Out
    </button>
  `;

  document.getElementById("gameDisplay").innerHTML =
    html;
}

function playMines(tile) {
  if (!minesStarted) return;

  if (openedMines.includes(tile)) return;

  if (tile === minePosition) {
    minesStarted = false;

    document.getElementById("gameMsg").innerText =
      "💣 You hit the bomb and lost!";

    showGame("mines");
    return;
  }

  openedMines.push(tile);

  minesMultiplier += 0.35;

  document.getElementById("gameMsg").innerText =
    `💎 Safe! Multiplier x${minesMultiplier.toFixed(2)}`;

  if (openedMines.length === 8) {
    cashoutMines();
    return;
  }

  renderMines();
}

function cashoutMines() {
  if (!minesStarted) return;

  minesStarted = false;

  const winnings = Math.floor(
    minesBet * minesMultiplier
  );

  balance += winnings;

  updateProfile();
  saveUser();

  document.getElementById("gameMsg").innerText =
    `Cashed out ${winnings} credits!`;

  showGame("mines");
}



/* ================= TOWERS ================= */

let towerBet = 0;
let towerMultiplier = 1;
let currentRow = 1;
let towerBombs = {};
let towersStarted = false;

function startTowers() {
  const bet = Number(
    document.getElementById("customBet")?.value
  );

  if (!bet || bet <= 0) {
    document.getElementById("gameMsg").innerText =
      "Enter a valid bet";
    return;
  }

  if (bet > balance) {
    document.getElementById("gameMsg").innerText =
      "Not enough balance";
    return;
  }

  towerBet = bet;
  towerMultiplier = 1;
  currentRow = 1;
  towersStarted = true;
  towerBombs = {};

  // each row gets 1 hidden bomb
  for (let row = 1; row <= 9; row++) {
    towerBombs[row] =
      Math.floor(Math.random() * 3) + 1;
  }

  // remove bet instantly
  balance -= bet;
  totalWagered += bet;

  updateProfile();
  saveUser();

  renderTowers();

  document.getElementById("gameMsg").innerText =
    "Towers game started!";
}

function renderTowers() {
  let html = `
    <h2>Towers</h2>
    <p><strong>Bet:</strong> ${towerBet}</p>
    <p><strong>Multiplier:</strong> x${towerMultiplier.toFixed(2)}</p>
    <p>Row ${currentRow} / 9</p>
  `;

  for (let row = 9; row >= 1; row--) {
    html += `<div style="margin:10px;">`;

    for (let col = 1; col <= 3; col++) {
      if (row === currentRow) {
        html += `
          <button onclick="playTowers(${row}, ${col})">
            ?
          </button>
        `;
      } else if (row < currentRow) {
        html += `
          <button disabled>✅</button>
        `;
      } else {
        html += `
          <button disabled>⬜</button>
        `;
      }
    }

    html += `</div>`;
  }

  html += `
    <br>
    <button onclick="cashoutTowers()">
      Cash Out
    </button>
  `;

  document.getElementById("gameDisplay").innerHTML =
    html;
}

function playTowers(row, col) {
  if (!towersStarted) return;

  if (row !== currentRow) return;

  // bomb hit
  if (towerBombs[row] === col) {
    towersStarted = false;

    document.getElementById("gameMsg").innerText =
      "💣 You hit the bomb and lost!";

    showGame("towers");
    return;
  }

  // survived row
  towerMultiplier += 0.30;
  currentRow++;

  document.getElementById("gameMsg").innerText =
    `Safe! Multiplier x${towerMultiplier.toFixed(2)}`;

  // cleared all 9 rows
  if (currentRow > 9) {
    cashoutTowers();
    return;
  }

  renderTowers();
}

function cashoutTowers() {
  if (!towersStarted) return;

  towersStarted = false;

  const winnings = Math.floor(
    towerBet * towerMultiplier
  );

  balance += winnings;

  updateProfile();
  saveUser();

  document.getElementById("gameMsg").innerText =
    `Cashed out ${winnings} credits!`;

  showGame("towers");
}

  }
}

async function saveUser() {
  if (!currentUser || currentUser === "admin") return;

  const res = await fetch(`${API}/updateUser`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: currentUser,
      balance,
      totalWagered,
      robloxUsername,
      profilePicture
    })
  });

  const text = await res.text();
  console.log("SAVE USER:", text);
}
function changeProfilePicture() {
  const file =
    document.getElementById("profilePicInput").files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(e) {
    profilePicture = e.target.result;

    localStorage.setItem(
      "profilePicture",
      profilePicture
    );

    document.getElementById("profilePicPreview").src =
      profilePicture;

    await saveUser();   // THIS is the missing part

    updateProfile();
  };

  reader.readAsDataURL(file);
}

async function changeUsername() {
  const newUsername = prompt(
    "Enter new username:"
  );

  if (!newUsername || !newUsername.trim()) return;

  const cleaned = newUsername.trim();

  const res = await fetch(`${API}/changeUsername`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      oldUsername: currentUser,
      newUsername: cleaned
    })
  });

  const text = await res.text();

  if (text !== "Username updated") {
    alert(text);
    return;
  }

  currentUser = cleaned;

  localStorage.setItem(
    "currentUser",
    currentUser
  );

  updateProfile();
  await saveUser();

  alert("Username updated successfully");
}

function logout() {
  localStorage.removeItem("currentUser");
  localStorage.removeItem("balance");
  localStorage.removeItem("totalWagered");
  localStorage.removeItem("robloxUsername");
  localStorage.removeItem("profilePicture");

  location.reload();
}
showGame("coinflip");

profilePicture =
  localStorage.getItem("profilePicture") || "";

/* NORMAL USER AUTO LOGIN */
if (currentUser && currentUser !== "admin") {
  document.getElementById("loginBox")
    .classList.add("hidden");

  document.getElementById("dashboard")
    .classList.remove("hidden");

  refreshUserData();

  const params = new URLSearchParams(window.location.search);

  if (params.get("refreshUser") === "true") {
    window.history.replaceState({}, document.title, "/");
  }
}

/* ADMIN AUTO LOGIN */
if (currentUser === "admin") {
  document.getElementById("loginBox")
    .classList.add("hidden");

  document.getElementById("dashboard")
    .classList.remove("hidden");

  document.getElementById("profileUser").innerText =
    "Admin";

  document.getElementById("profileUserRight").innerText =
    "Admin";

  document.getElementById("profileBalance").innerText =
    "∞";

  document.getElementById("profileBalanceRight").innerText =
    "∞";

  document.getElementById("profileWagered").innerText =
    "Admin Access";

  document.getElementById("profileRoblox").innerText =
    "Administrator";

  loadAdminPanel();
}
</script>
