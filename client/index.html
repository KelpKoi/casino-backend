<!-- client/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casino Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .login-box {
      width: 450px;
      margin: 80px auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
    }

    .dashboard {
      padding: 20px;
    }

    .section {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h1>Casino Login</h1>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard hidden" id="dashboard">
<div class="section hidden" id="adminPanel">
  <h2>Admin Panel</h2>

  <button onclick="loadAdminPanel()">
    Refresh Users
  </button>

  <pre id="adminUsers"></pre>
</div>

  <!-- DEPOSIT -->

  <div class="section">
    <h2>Deposit Credits</h2>

    <button onclick="deposit(500)">+500</button>
    <button onclick="deposit(2000)">+2000</button>
    <button onclick="deposit(5000)">+5000</button>

    <p id="depositMsg"></p>
  </div>

  <!-- COINFLIP -->
  <div class="section">
    <h2>Coinflip</h2>

    <button onclick="coinFlip('heads')">Heads</button>
    <button onclick="coinFlip('tails')">Tails</button>

    <p id="gameMsg"></p>
  </div>

</div>

<script>
const API = "https://casino-backend-nah2.onrender.com";

let currentUser = localStorage.getItem("currentUser") || "";
let balance = Number(localStorage.getItem("balance")) || 0;
let totalWagered = Number(localStorage.getItem("totalWagered")) || 0;
let robloxUsername = localStorage.getItem("robloxUsername") || "";

/* REGISTER */
async function register() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    document.getElementById("loginMsg").innerText = "Fill all fields";
    return;
  }

  const res = await fetch(`${API}/register`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username,
      password
    })
  });

  const text = await res.text();
  document.getElementById("loginMsg").innerText = text;
}

/* LOGIN */
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username,
      password
    })
  });

  const data = await res.json();

  /* ---------- ADMIN LOGIN ---------- */

  if (data.isAdmin) {
    currentUser = "admin";

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("profileUser").innerText = "Admin";
    document.getElementById("profileBalance").innerText = "∞";
    document.getElementById("profileWagered").innerText = "Admin Access";
    document.getElementById("profileRoblox").innerText = "Administrator";

    loadAdminPanel();
    return;
  }

  /* ---------- NORMAL USER LOGIN ---------- */

  if (data.message !== "Login success") {
    document.getElementById("loginMsg").innerText = data.message;
    return;
  }

  currentUser = data.username;
  balance = data.balance || 0;
  totalWagered = data.totalWagered || 0;
  robloxUsername = data.robloxUsername || "";

  updateProfile();

  localStorage.setItem("currentUser", currentUser);
  localStorage.setItem("balance", balance);
  localStorage.setItem("totalWagered", totalWagered);
  localStorage.setItem("robloxUsername", robloxUsername);

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

/* PROFILE */
function updateProfile() {
  document.getElementById("profileUser").innerText =
    currentUser || "";

  document.getElementById("profileBalance").innerText =
    balance || 0;

  document.getElementById("profileWagered").innerText =
    totalWagered || 0;

  document.getElementById("profileRoblox").innerText =
    robloxUsername || "Not Linked";
}

/* DEPOSIT */
async function deposit(amount) {
  balance += amount;

  await saveUser();
  updateProfile();

  document.getElementById("depositMsg").innerText =
    "Credits added";
}

/* COINFLIP */
async function coinFlip(choice) {
  const bet = 100;

  if (balance < bet) {
    document.getElementById("gameMsg").innerText =
      "Not enough balance";
    return;
  }

  balance -= bet;
  totalWagered += bet;

  const result =
    Math.random() < 0.5 ? "heads" : "tails";

  if (choice === result) {
    balance += 200;
    document.getElementById("gameMsg").innerText =
      "You won!";
  } else {
    document.getElementById("gameMsg").innerText =
      "You lost!";
  }

  await saveUser();
  updateProfile();
}

/* SAVE USER */
async function saveUser() {
  await fetch(`${API}/updateUser`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: currentUser,
      balance,
      totalWagered,
      robloxUsername
    })
  });
}

/* ROBLOX LINK */
function linkRoblox() {
  window.location.href =
    `${API}/auth/roblox?username=${currentUser}`;
}

/* LOGOUT */

async function loadAdminPanel() {
  document.getElementById("adminPanel")
    .classList.remove("hidden");

  const res = await fetch(`${API}/admin/users`);
  const users = await res.json();

  document.getElementById("adminUsers").innerText =
    JSON.stringify(users, null, 2);
}

function logout() {
  localStorage.removeItem("currentUser");
  localStorage.removeItem("balance");
  localStorage.removeItem("totalWagered");
  localStorage.removeItem("robloxUsername");
  location.reload();
}

if (currentUser) {
  updateProfile();
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

</script>

</body>
</html>
