<!-- client/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casino Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .login-box {
      width: 450px;
      margin: 80px auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
    }

    .dashboard {
      padding: 20px;
    }

    .section {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h1>Casino Login</h1>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard hidden" id="dashboard">

  <!-- TOP BAR -->
  <div style="display:flex; justify-content:space-between; align-items:center; background:#1e293b; padding:20px 30px; border-radius:12px; margin-bottom:20px;">

    <h2>Defined Casino</h2>

    <div style="display:flex; align-items:center; gap:20px;">

      <div>
        <strong>Balance: </strong>
        <span id="profileBalance">0</span>
        <button onclick="deposit(500)">+</button>
      </div>

      <div onclick="toggleProfilePanel()" style="display:flex; align-items:center; gap:10px; cursor:pointer;">
       <img
  id="profilePicPreview"
  src=""
  style="
    width:45px;
    height:45px;
    border-radius:50%;
    background:#334155;
    object-fit:cover;
  "
/>
        <strong id="profileUser">User</strong>
      </div>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div style="display:flex; gap:20px;">

    <!-- LEFT GAME TABS -->
    <div style="width:250px; background:#1e293b; padding:20px; border-radius:12px;">
      <button onclick="showGame('coinflip')">Coinflip</button><br><br>
      <button onclick="showGame('mines')">Mines</button><br><br>
      <button onclick="showGame('towers')">Towers</button><br><br>
      <button onclick="showGame('blackjack')">Blackjack</button><br><br>
    </div>

    <!-- CENTER GAME AREA -->
    <div style="flex:1; background:#1e293b; padding:30px; border-radius:12px;">
      <div id="gameDisplay">
        <h2>Select a Game</h2>
      </div>
      <p id="gameMsg"></p>
    </div>

    <!-- RIGHT PROFILE PANEL -->
    <div id="profilePanel" class="hidden" style="width:300px; background:#1e293b; padding:20px; border-radius:12px;">
      <h2>Account Settings</h2>

      <p><strong>User:</strong> <span id="profileUserRight"></span></p>
      <p><strong>Roblox:</strong> <span id="profileRoblox">Not Linked</span></p>
      <p><strong>Balance:</strong> <span id="profileBalanceRight">0</span></p>
      <p><strong>Total Wagered:</strong> <span id="profileWagered">0</span></p>

     <button onclick="changeUsername()">
  Change Username
</button>

<br><br>

<input
  type="file"
  id="profilePicInput"
  accept="image/*"
  onchange="changeProfilePicture()"
  style="display:none;"
>

<button onclick="
  document.getElementById('profilePicInput').click()
">
  Change Profile Picture
</button>
      <br><br>

<button onclick="linkRoblox()">
  Link Roblox
</button>

<br><br>

<button onclick="logout()">
  Logout
</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="section hidden" id="adminPanel">
    <h2>Admin Panel</h2>
    <button onclick="loadAdminPanel()">Refresh Users</button>
    <div id="adminUsers"></div>
  </div>

</div>

<script>
const API = "https://casino-backend-nah2.onrender.com";

let currentUser = localStorage.getItem("currentUser") || "";
let balance = Number(localStorage.getItem("balance")) || 0;
let totalWagered = Number(localStorage.getItem("totalWagered")) || 0;
let robloxUsername = localStorage.getItem("robloxUsername") || "";
let profilePicture =
  localStorage.getItem("profilePicture") || "";

async function register() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch(`${API}/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  document.getElementById("loginMsg").innerText = await res.text();
}

async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.isAdmin) {
    currentUser = "admin";
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("profileUser").innerText = "Admin";
    document.getElementById("profileUserRight").innerText = "Admin";
    document.getElementById("profileBalance").innerText = "∞";
    document.getElementById("profileBalanceRight").innerText = "∞";
    document.getElementById("profileWagered").innerText = "Admin Access";
    document.getElementById("profileRoblox").innerText = "Administrator";
    loadAdminPanel();
    return;
  }

  if (data.message !== "Login success") {
    document.getElementById("loginMsg").innerText = data.message;
    return;
  }

  currentUser = data.username;
  balance = data.balance || 0;
  totalWagered = data.totalWagered || 0;
  robloxUsername = data.robloxUsername || "";

  localStorage.setItem("currentUser", currentUser);
  localStorage.setItem("balance", balance);
  localStorage.setItem("totalWagered", totalWagered);
  localStorage.setItem("robloxUsername", robloxUsername);

  updateProfile();
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

function updateProfile() {
  document.getElementById("profileUser").innerText =
    currentUser || "";

  document.getElementById("profileUserRight").innerText =
    currentUser || "";

  document.getElementById("profileBalance").innerText =
    balance || 0;

  document.getElementById("profileBalanceRight").innerText =
    balance || 0;

  document.getElementById("profileWagered").innerText =
    totalWagered || 0;

  document.getElementById("profileRoblox").innerText =
    robloxUsername || "Not Linked";

  if (profilePicture) {
    document.getElementById("profilePicPreview").src =
      profilePicture;
  }
}

async function deposit(amount) {
  balance += amount;
  await saveUser();
  updateProfile();
}

async function coinFlip(choice) {
  if (balance < 100) {
    document.getElementById("gameMsg").innerText = "Not enough balance";
    return;
  }

  balance -= 100;
  totalWagered += 100;

  const result = Math.random() < 0.5 ? "heads" : "tails";

  if (choice === result) {
    balance += 200;
    document.getElementById("gameMsg").innerText = "You won!";
  } else {
    document.getElementById("gameMsg").innerText = "You lost!";
  }

  await saveUser();
  updateProfile();
}

function playMines(tile) {
  const mine = Math.floor(Math.random() * 3) + 1;
  balance -= 100;
  totalWagered += 100;

  if (tile !== mine) {
    balance += 180;
    document.getElementById("gameMsg").innerText = "Safe tile!";
  } else {
    document.getElementById("gameMsg").innerText = "Boom!";
  }

  saveUser();
  updateProfile();
}

function playTowers(side) {
  const safe = Math.random() < 0.5 ? "left" : "right";
  balance -= 100;
  totalWagered += 100;

  if (side === safe) {
    balance += 200;
    document.getElementById("gameMsg").innerText = "Safe step!";
  } else {
    document.getElementById("gameMsg").innerText = "Trap!";
  }

  saveUser();
  updateProfile();
}

function playBlackjack(action) {
  balance -= 100;
  totalWagered += 100;

  if (action === "stay") {
    balance += 180;
    document.getElementById("gameMsg").innerText = "Dealer busts!";
  } else {
    document.getElementById("gameMsg").innerText = "You busted!";
  }

  saveUser();
  updateProfile();
}

async function saveUser() {
  await fetch(`${API}/updateUser`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: currentUser,
      balance,
      totalWagered,
      robloxUsername
    })
  });
}
function changeProfilePicture() {
  const file =
    document.getElementById("profilePicInput").files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    profilePicture = e.target.result;

    localStorage.setItem(
      "profilePicture",
      profilePicture
    );

    document.getElementById("profilePicPreview").src =
      profilePicture;
  };

  reader.readAsDataURL(file);
}

async function changeUsername() {
  const newUsername =
    prompt("Enter new username:");

  if (!newUsername || !newUsername.trim()) return;

  const cleaned = newUsername.trim();

  const res = await fetch(`${API}/admin/users`);
  const users = await res.json();

  const taken = users.find(
    u =>
      u.username.toLowerCase() ===
      cleaned.toLowerCase()
  );

  if (taken) {
    alert("That username is already taken");
    return;
  }

  currentUser = cleaned;

  localStorage.setItem(
    "currentUser",
    currentUser
  );

  updateProfile();

  alert("Username updated locally (backend route can be added next)");
}
function linkRoblox() {
  window.location.href = `${API}/auth/roblox?username=${currentUser}`;
}

async function loadAdminPanel() {
  document.getElementById("adminPanel")
    .classList.remove("hidden");

  const res = await fetch(`${API}/admin/users`);
  const users = await res.json();

  let html = "";

  users.forEach(user => {
    html += `
      <div style="
        background:#0f172a;
        padding:20px;
        margin:15px 0;
        border-radius:12px;
        text-align:left;
        border:1px solid rgba(255,255,255,0.08);
      ">
        <h3 style="margin-bottom:10px;">
          ${user.username}
        </h3>

        <p><strong>Balance:</strong> ${user.balance}</p>
        <p><strong>Total Wagered:</strong> ${user.totalWagered}</p>
        <p><strong>Roblox:</strong> ${user.robloxUsername || "Not Linked"}</p>

        <div style="margin-top:15px;">

          <button onclick="changeBalance('${user.username}', 1000)">
            +1000
          </button>

          <button onclick="changeBalance('${user.username}', -1000)">
            -1000
          </button>

          <button onclick="deleteUser('${user.username}')">
            Delete Account
          </button>

        </div>
      </div>
    `;
  });

  document.getElementById("adminUsers").innerHTML = html;
}

async function changeBalance(username, amount) {
  const res = await fetch(`${API}/admin/changeBalance`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username,
      amount
    })
  });

  const text = await res.text();
  console.log(text);

  await loadAdminPanel();
}

async function deleteUser(username) {
  const confirmDelete = confirm(
    `Delete account for ${username}?`
  );

  if (!confirmDelete) return;

  const res = await fetch(`${API}/admin/deleteUser`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username
    })
  });

  const text = await res.text();
  console.log(text);

  await loadAdminPanel();
}

function toggleProfilePanel() {
  const panel = document.getElementById("profilePanel");

  if (!panel) return;

  panel.classList.toggle("hidden");

  document.getElementById("profileUserRight").innerText =
    currentUser || "";

  document.getElementById("profileBalanceRight").innerText =
    balance || 0;

  document.getElementById("profileWagered").innerText =
    totalWagered || 0;

  document.getElementById("profileRoblox").innerText =
    robloxUsername || "Not Linked";
}

function showGame(game) {
  const gameDisplay =
    document.getElementById("gameDisplay");

  if (!gameDisplay) return;

  if (game === "coinflip") {
    gameDisplay.innerHTML = `
      <h2>Coinflip</h2>
      <button onclick="coinFlip('heads')">Heads</button>
      <button onclick="coinFlip('tails')">Tails</button>
      <p>Bet: 100 credits</p>
    `;
  }

  if (game === "mines") {
    gameDisplay.innerHTML = `
      <h2>Mines</h2>
      <button onclick="playMines(1)">Tile 1</button>
      <button onclick="playMines(2)">Tile 2</button>
      <button onclick="playMines(3)">Tile 3</button>
      <p>1 hidden mine</p>
    `;
  }

  if (game === "towers") {
    gameDisplay.innerHTML = `
      <h2>Towers</h2>
      <button onclick="playTowers('left')">Left Step</button>
      <button onclick="playTowers('right')">Right Step</button>
      <p>Choose the safe side</p>
    `;
  }

  if (game === "blackjack") {
    gameDisplay.innerHTML = `
      <h2>Blackjack</h2>
      <button onclick="playBlackjack('hit')">Hit</button>
      <button onclick="playBlackjack('stay')">Stay</button>
      <p>Dealer shows 8</p>
    `;
  }
}
function logout() {
  localStorage.removeItem("currentUser");
  localStorage.removeItem("balance");
  localStorage.removeItem("totalWagered");
  localStorage.removeItem("robloxUsername");
  localStorage.removeItem("profilePicture");

  location.reload();
}
showGame("coinflip");
if (currentUser && currentUser !== "admin") {
  updateProfile();
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}
</script>

</body>
</html>
