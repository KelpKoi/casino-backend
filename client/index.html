<!-- client/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casino Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .login-box {
      width: 450px;
      margin: 80px auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
    }

    .dashboard {
      padding: 20px;
    }

    .section {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    pre {
      text-align: left;
      background: #0b1120;
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h1>Casino Login</h1>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard hidden" id="dashboard">

  <!-- ADMIN PANEL -->
  <div class="section hidden" id="adminPanel">
    <h2>Admin Panel</h2>

    <button onclick="loadAdminPanel()">
      Refresh Users
    </button>

    <div id="adminUsers"></div>
  </div>

  <!-- PROFILE -->
  <div class="section">
    <h2>Profile</h2>

    <p><strong>User:</strong> <span id="profileUser"></span></p>
    <p><strong>Roblox:</strong> <span id="profileRoblox">Not Linked</span></p>
    <p><strong>Balance:</strong> <span id="profileBalance">0</span></p>
    <p><strong>Total Wagered:</strong> <span id="profileWagered">0</span></p>

    <button onclick="linkRoblox()">Link Roblox</button>
    <button onclick="logout()">Logout</button>

    <p id="robloxMsg"></p>
  </div>

  <!-- DEPOSIT -->
  <div class="section">
    <h2>Deposit Credits</h2>

    <button onclick="deposit(500)">+500</button>
    <button onclick="deposit(2000)">+2000</button>
    <button onclick="deposit(5000)">+5000</button>

    <p id="depositMsg"></p>
  </div>

  <!-- COINFLIP -->
  <div class="section">
    <h2>Coinflip</h2>

    <button onclick="coinFlip('heads')">Heads</button>
    <button onclick="coinFlip('tails')">Tails</button>

    <p id="gameMsg"></p>
  </div>

</div>

<script>
const API = "https://casino-backend-nah2.onrender.com";

let currentUser = localStorage.getItem("currentUser") || "";
let balance = Number(localStorage.getItem("balance")) || 0;
let totalWagered = Number(localStorage.getItem("totalWagered")) || 0;
let robloxUsername = localStorage.getItem("robloxUsername") || "";

/* REGISTER */
async function register() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    document.getElementById("loginMsg").innerText = "Fill all fields";
    return;
  }

  const res = await fetch(`${API}/register`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username,
      password
    })
  });

  const text = await res.text();
  document.getElementById("loginMsg").innerText = text;
}

/* LOGIN */
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username,
      password
    })
  });

  const data = await res.json();

  /* ADMIN LOGIN */

  if (data.isAdmin) {
    currentUser = "admin";

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("profileUser").innerText = "Admin";
    document.getElementById("profileBalance").innerText = "∞";
    document.getElementById("profileWagered").innerText = "Admin Access";
    document.getElementById("profileRoblox").innerText = "Administrator";

    loadAdminPanel();
    return;
  }

  /* NORMAL USER LOGIN */

  if (data.message !== "Login success") {
    document.getElementById("loginMsg").innerText = data.message;
    return;
  }

  currentUser = data.username;
  balance = data.balance || 0;
  totalWagered = data.totalWagered || 0;
  robloxUsername = data.robloxUsername || "";

  updateProfile();

  localStorage.setItem("currentUser", currentUser);
  localStorage.setItem("balance", balance);
  localStorage.setItem("totalWagered", totalWagered);
  localStorage.setItem("robloxUsername", robloxUsername);

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

/* PROFILE */
function updateProfile() {
  document.getElementById("profileUser").innerText =
    currentUser || "";

  document.getElementById("profileBalance").innerText =
    balance || 0;

  document.getElementById("profileWagered").innerText =
    totalWagered || 0;

  document.getElementById("profileRoblox").innerText =
    robloxUsername || "Not Linked";
}

/* DEPOSIT */
async function deposit(amount) {
  balance += amount;

  await saveUser();
  updateProfile();

  document.getElementById("depositMsg").innerText =
    "Credits added";
}

/* COINFLIP */
async function coinFlip(choice) {
  const bet = 100;

  if (balance < bet) {
    document.getElementById("gameMsg").innerText =
      "Not enough balance";
    return;
  }

  balance -= bet;
  totalWagered += bet;

  const result =
    Math.random() < 0.5 ? "heads" : "tails";

  if (choice === result) {
    balance += 200;
    document.getElementById("gameMsg").innerText =
      "You won!";
  } else {
    document.getElementById("gameMsg").innerText =
      "You lost!";
  }

  await saveUser();
  updateProfile();
}

/* SAVE USER */
async function saveUser() {
  console.log("Saving user:", {
    username: currentUser,
    balance: balance,
    totalWagered: totalWagered,
    robloxUsername: robloxUsername
  });

  const res = await fetch(`${API}/updateUser`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: currentUser,
      balance: Number(balance),
      totalWagered: Number(totalWagered),
      robloxUsername: robloxUsername || ""
    })
  });

  const text = await res.text();
  console.log("Update response:", text);
}

/* ROBLOX LINK */
function linkRoblox() {
  window.location.href =
    `${API}/auth/roblox?username=${currentUser}`;
}

/* ADMIN PANEL */
async function loadAdminPanel() {
  document.getElementById("adminPanel")
    .classList.remove("hidden");

  const res = await fetch(`${API}/admin/users`);
  const users = await res.json();

  let html = "";

  users.forEach(user => {
    html += `
      <div style="
        background:#0f172a;
        padding:20px;
        margin:15px 0;
        border-radius:12px;
        text-align:left;
      ">
        <h3>${user.username}</h3>

        <p><strong>Balance:</strong> ${user.balance}</p>
        <p><strong>Total Wagered:</strong> ${user.totalWagered}</p>
        <p><strong>Roblox:</strong> ${user.robloxUsername || "Not Linked"}</p>

        <button onclick="changeBalance('${user.username}', 1000)">
          +1000
        </button>

        <button onclick="changeBalance('${user.username}', -1000)">
          -1000
        </button>

        <button onclick="deleteUser('${user.username}')">
          Delete Account
        </button>
      </div>
    `;
  });

  document.getElementById("adminUsers").innerHTML = html;
}
async function changeBalance(username, amount) {
  await fetch(`${API}/admin/changeBalance`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username,
      amount
    })
  });

  loadAdminPanel();
}

async function deleteUser(username) {
  await fetch(`${API}/admin/deleteUser`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username
    })
  });

  loadAdminPanel();
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("currentUser");
  localStorage.removeItem("balance");
  localStorage.removeItem("totalWagered");
  localStorage.removeItem("robloxUsername");
  location.reload();
}

/* AUTO LOGIN AFTER REFRESH */
if (currentUser && currentUser !== "admin") {
  updateProfile();
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}
</script>

</body>
</html>
